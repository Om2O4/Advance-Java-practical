<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Servlet Application UI</title>
</head>
<body>
    <h1>Servlet Controller</h1>
    <div>
        <h3>Main Service</h3>
        <form action="main" method="get">
            <input type="text" name="msg" placeholder="Enter message">
            <button type="submit">Send to SimpleServlet</button>
        </form>
    </div>
    <hr>
    <div>
    
    
        <h3>System Diagnostics</h3>
        <form action="test" method="get">
            <button type="submit">Run TestingServlet</button>
        </form>
    </div>
</body>
</html>
